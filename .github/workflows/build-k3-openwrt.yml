name: 📦 编译 K3 ImmortalWrt

on:
    workflow_dispatch:

permissions:
    contents: write
    actions: write

env:
    REPO_URL: https://github.com/immortalwrt/immortalwrt
    REPO_BRANCH: openwrt-24.10
    CONFIG_FILE: K3-LEDE/.config
    DIY_SH: K3-LEDE/diy.sh
    FILES: K3-LEDE/files
    TZ: Asia/Shanghai

jobs:
    build:
        name: 🧱 构建 K3 固件 (${{ matrix.variant_name }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - variant: imm-wifi
                      variant_name: ImmortalWrt 自带无线固件
                      factory_wifi: "false"
                      txpower: "true"
                    - variant: factory-wifi-noset
                      variant_name: K3 原厂 WiFi 固件（不能设置 WiFi 密码）
                      factory_wifi: "true"
                      txpower: "false"

        steps:
            - name: 🧹 释放编译空间
              uses: rmoyulong/maximize-build-space@master
              with:
                  root-reserve-mb: 2048
                  swap-size-mb: 1024
                  build-mount-path: /workdir
                  overprovision-lvm: "true"
                  remove-dotnet: "true"
                  remove-android: "true"
                  remove-haskell: "true"
                  remove-codeql: "true"
                  remove-docker-images: "true"

            - name: 📊 检查磁盘空间
              run: |
                  echo "Free space:"
                  df -h

            - name: 📥 检出当前仓库
              uses: actions/checkout@v6

            - name: 🧰 安装编译依赖
              env:
                  DEBIAN_FRONTEND: noninteractive
              run: |
                  sudo -E apt-get -qq update --fix-missing
                  sudo -E apt-get -qq full-upgrade -y
                  sudo -E apt-get -qq install -y $(cat "$GITHUB_WORKSPACE/deps/ubuntu.txt")
                  sudo -E apt-get -qq autoremove --purge -y
                  sudo -E apt-get -qq clean
                  sudo timedatectl set-timezone "$TZ"
                  sudo mkdir -p /workdir
                  sudo chown "$USER:$GROUPS" /workdir

            - name: 🌱 克隆 OpenWrt 源码
              working-directory: /workdir
              run: |
                  git clone --single-branch --depth=1 --branch="$REPO_BRANCH" "$REPO_URL" openwrt
                  ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

            - name: 💾 缓存编译目录
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.ccache
                      /workdir/openwrt/dl
                      /workdir/openwrt/build_dir/host
                      /workdir/openwrt/build_dir/toolchain-*
                      /workdir/openwrt/staging_dir/host
                      /workdir/openwrt/staging_dir/toolchain-*
                  key: ${{ runner.os }}-immortalwrt-K3-${{ matrix.variant }}-${{ env.REPO_BRANCH }}-${{ hashFiles('K3-LEDE/.config') }}
                  restore-keys: |
                      ${{ runner.os }}-immortalwrt-K3-${{ matrix.variant }}-${{ env.REPO_BRANCH }}-
                      ${{ runner.os }}-immortalwrt-K3-${{ env.REPO_BRANCH }}-

            - name: 🛠️ 准备脚本和配置
              run: |
                  [ -e "$CONFIG_FILE" ] && dos2unix "$CONFIG_FILE"
                  [ -e "$DIY_SH" ] && dos2unix "$DIY_SH"
                  chmod +x "$DIY_SH"

            - name: 🔄 更新 feeds
              working-directory: ./openwrt
              run: |
                  ./scripts/feeds update -a

            - name: ⚙️ 加载自定义配置
              env:
                  K3_FACTORY_WIFI: ${{ matrix.factory_wifi }}
              run: |
                  [ -e $FILES ] && cp -a $FILES openwrt/files
                  if [ "${{ matrix.txpower }}" != "true" ]; then
                    rm -f openwrt/files/etc/init.d/k3-txpower
                    rm -f openwrt/files/etc/uci-defaults/99-k3-txpower
                    sed -i 's/^CONFIG_PACKAGE_wireless-tools=y/CONFIG_PACKAGE_wireless-tools=n/' "$CONFIG_FILE"
                  fi
                  [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
                  cd openwrt
                  $GITHUB_WORKSPACE/$DIY_SH

            - name: 📚 安装 feeds
              working-directory: ./openwrt
              run: |
                  ./scripts/feeds install -a

            - name: 🧽 清理旧源码缓存
              working-directory: ./openwrt
              run: |
                  rm -rf dl/go-mod-cache
                  rm -f dl/*tcping* dl/*shadowsocks-libev* dl/*shadowsocksr-libev* dl/*simple-obfs* dl/*trojan-plus* dl/*Xray-core* dl/*xray-core*

            - name: 📦 下载源码包
              working-directory: ./openwrt
              run: |
                  make defconfig
                  make download -j8
                  find dl -size -1024c -exec ls -l {} \;
                  find dl -size -1024c -exec rm -f {} \;

            - name: 🔨 编译固件
              id: compile
              run: |
                  chmod -R 755 openwrt
                  cd openwrt
                  echo -e "$(nproc) thread compile"
                  make -j$(nproc) || make -j1 V=s
                  echo "compile_status=success" >> $GITHUB_ENV
                  echo "status=success" >> $GITHUB_OUTPUT

            - name: 🗂️ 整理发布产物
              if: ${{ steps.compile.outputs.status == 'success' && !cancelled() }}
              run: |
                  test -d openwrt/bin/targets/bcm53xx/generic
                  mkdir -p release_artifacts
                  for file in openwrt/bin/targets/bcm53xx/generic/*phicomm_k3*.trx; do
                    [ -f "$file" ] || continue
                    cp -a "$file" "release_artifacts/k3-${{ matrix.variant }}-$(basename "$file")"
                  done

            - name: 📤 上传 K3 固件产物
              if: ${{ steps.compile.outputs.status == 'success' && !cancelled() }}
              uses: actions/upload-artifact@v4
              with:
                  name: k3-${{ matrix.variant }}
                  path: release_artifacts/*

    release:
        name: 🚀 发布 K3 ImmortalWrt 固件
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: 📥 下载 K3 固件产物
              uses: actions/download-artifact@v4
              with:
                  path: release_artifacts
                  merge-multiple: true

            - name: 🗓️ 生成发布版本号
              run: |
                  echo "release_date=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

            - name: 🚀 发布 ImmortalWrt 固件
              uses: ncipollo/release-action@v1
              with:
                  tag: ImmortalWrt_K3_${{ env.release_date }}
                  artifacts: release_artifacts/*
                  allowUpdates: true
                  token: ${{ secrets.GITHUB_TOKEN }}
                  body: |
                      基于 ImmortalWrt 24.10 构建
                      设备: 斐讯 K3
                      源码: immortalwrt/immortalwrt openwrt-24.10，bcm53xx 使用 6.6 内核
                      默认管理地址: 10.10.10.1
                      默认账户: root
                      默认密码: password

                      本次 K3 同时发布两个无线固件版本：
                      1. k3-imm-wifi-*：使用 ImmortalWrt 源码自带 K3 WiFi 固件，包含 iwconfig 开机设置 wlan0/wlan1 为 20 dBm。
                      2. k3-factory-wifi-noset-*：使用 K3 原厂 WiFi 固件 brcmfmac4366c-pcie.bin.k3，效果较好，但不能设置 WiFi 密码，且不包含 iwconfig 开机功率脚本。

            - name: 🗑️ 清理旧版本发布
              uses: actions/github-script@v8
              env:
                  KEEP_LATEST: 10
                  DELETE_TAGS: true
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const keepLatest = Number(process.env.KEEP_LATEST || 10);
                      const deleteTags = String(process.env.DELETE_TAGS || "true").toLowerCase() === "true";
                      const { owner, repo } = context.repo;
                      const prefix = "ImmortalWrt_K3_";
                      const releases = await github.paginate(
                        github.rest.repos.listReleases,
                        { owner, repo, per_page: 100 }
                      );
                      const filtered = releases
                        .filter((release) => release.tag_name && release.tag_name.startsWith(prefix))
                        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                      const toDelete = filtered.slice(keepLatest);
                      for (const release of toDelete) {
                        await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
                        if (deleteTags && release.tag_name) {
                          try {
                            await github.rest.git.deleteRef({ owner, repo, ref: `tags/${release.tag_name}` });
                          } catch (err) {
                            core.warning(`Failed to delete tag ${release.tag_name}: ${err.message}`);
                          }
                        }
                      }

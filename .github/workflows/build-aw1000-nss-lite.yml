name: 📦 编译 AW1000 NSS Lite OpenWrt

on:
    workflow_dispatch:
        inputs:
            theme_argon:
                description: "启用 Argon 主题和配置页面"
                type: boolean
                default: true
            theme_aurora:
                description: "启用 Aurora 主题和配置页面"
                type: boolean
                default: false
            theme_alpha:
                description: "启用 Alpha 主题和配置页面"
                type: boolean
                default: false

permissions:
    contents: write
    actions: write

env:
    REPO_URL: https://github.com/qosmio/openwrt-ipq.git
    REPO_BRANCH: 24.10-nss
    NSS_PACKAGES_BRANCH: NSS-12.5-K6.x-wwan
    USE_PYMUMU_SMARTDNS: "1"
    CONFIG_FILE: AW1000-NSS/.config
    DIY_SH: AW1000-NSS/diy.sh
    FILES: AW1000-NSS/files
    TZ: Asia/Shanghai

jobs:
    build:
        name: 🧱 构建 AW1000 NSS Lite 固件
        runs-on: ubuntu-latest

        steps:
            - name: 🧹 释放编译空间
              uses: easimon/maximize-build-space@master
              with:
                  root-reserve-mb: 2048
                  swap-size-mb: 1024
                  build-mount-path: /workdir
                  overprovision-lvm: "true"
                  remove-dotnet: "true"
                  remove-android: "true"
                  remove-haskell: "true"
                  remove-codeql: "true"
                  remove-docker-images: "true"

            - name: 📊 检查磁盘空间
              run: |
                  echo "Free space:"
                  df -h

            - name: 📥 检出当前仓库
              uses: actions/checkout@v6

            - name: 🎨 校验主题选择
              env:
                  THEME_ARGON: ${{ inputs.theme_argon }}
                  THEME_AURORA: ${{ inputs.theme_aurora }}
                  THEME_ALPHA: ${{ inputs.theme_alpha }}
              run: |
                  theme_count=0
                  [ "$THEME_ARGON" = "true" ] && theme_count=$((theme_count + 1))
                  [ "$THEME_AURORA" = "true" ] && theme_count=$((theme_count + 1))
                  [ "$THEME_ALPHA" = "true" ] && theme_count=$((theme_count + 1))
                  if [ "$theme_count" -lt 1 ]; then
                    echo "::error::至少选择一个主题：Argon、Aurora、Alpha"
                    exit 1
                  fi

            - name: 🧰 安装编译依赖
              env:
                  DEBIAN_FRONTEND: noninteractive
              run: |
                  sudo -E apt-get -qq update --fix-missing
                  sudo -E apt-get -qq install -y --no-install-recommends $(cat "$GITHUB_WORKSPACE/deps/ubuntu.txt")
                  sudo -E apt-get -qq autoremove --purge -y
                  sudo -E apt-get -qq clean
                  sudo timedatectl set-timezone "$TZ"
                  sudo mkdir -p /workdir
                  sudo chown "$USER:$GROUPS" /workdir

            - name: 🟢 准备 SmartDNS WebUI Node 环境
              uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - name: 🌱 克隆 OpenWrt 源码
              working-directory: /workdir
              run: |
                  git clone --single-branch --depth=1 --branch="$REPO_BRANCH" "$REPO_URL" openwrt
                  ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

            - name: 🩹 刷新 qosmio NSS bonding LAG 补丁
              working-directory: ./openwrt
              run: |
                  bash "$GITHUB_WORKSPACE/AW1000-NSS/scripts/refresh-qosmio-bonding-lag-patch.sh"
                  grep -n 'bond_should_broadcast_neighbor\|bond_xmit_xor' target/linux/qualcommax/patches-6.6/0600-4-qca-nss-ecm-support-net-bonding-over-LAG-interface.patch

            - name: 🧬 提取 LLVM BPF 预编译工具链
              working-directory: ./openwrt
              run: |
                  wget -nv https://downloads.openwrt.org/releases/24.10.6/targets/qualcommax/ipq807x/llvm-bpf-18.1.7.Linux-x86_64.tar.zst
                  tar --zstd -xf llvm-bpf-18.1.7.Linux-x86_64.tar.zst

            - name: 💾 缓存编译目录
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.ccache
                      /workdir/openwrt/dl
                  key: ${{ runner.os }}-openwrt-AW1000-NSS-Lite-${{ env.REPO_BRANCH }}-${{ env.NSS_PACKAGES_BRANCH }}-${{ hashFiles('AW1000-NSS/.config', 'AW1000-NSS/diy.sh', 'AW1000-NSS/scripts/**', 'AW1000-NSS/files/**', 'packages/**') }}
                  restore-keys: |
                      ${{ runner.os }}-openwrt-AW1000-NSS-Lite-${{ env.REPO_BRANCH }}-${{ env.NSS_PACKAGES_BRANCH }}-
                      ${{ runner.os }}-openwrt-AW1000-NSS-Lite-${{ env.REPO_BRANCH }}-

            - name: 🧯 限制 ccache 空间
              run: |
                  ccache -M 2G || true
                  ccache -c || true
                  df -h

            - name: 🛠️ 准备脚本和配置
              run: |
                  [ -e "$CONFIG_FILE" ] && dos2unix "$CONFIG_FILE"
                  [ -e "$DIY_SH" ] && dos2unix "$DIY_SH"
                  find AW1000-NSS/scripts -type f -exec dos2unix {} \;
                  find "$FILES" -type f -exec dos2unix {} \; || true
                  find packages -type f \( -name "*.sh" -o -name "Makefile" -o -name "*.js" -o -name "*.json" -o -name "*.lua" -o -name "*.po" -o -name "*.md" -o -path "*/etc/config/*" -o -path "*/etc/init.d/*" -o -path "*/etc/uci-defaults/*" \) -exec dos2unix {} \; || true
                  chmod +x "$DIY_SH"
                  find AW1000-NSS/scripts -type f -name "*.sh" -exec chmod +x {} \;

            - name: 🔄 更新 feeds
              working-directory: ./openwrt
              run: |
                  "$GITHUB_WORKSPACE/AW1000-NSS/scripts/update-feeds-conf.sh"
                  ./scripts/feeds update -a

            - name: 🧩 调整 feeds 源码
              working-directory: ./openwrt
              run: |
                  "$GITHUB_WORKSPACE/AW1000-NSS/scripts/prepare-feeds.sh"
                  if [ "${USE_PYMUMU_SMARTDNS:-0}" = "1" ]; then
                    ./scripts/feeds update -i packages luci
                  fi
                  ./scripts/feeds install -a

            - name: ⚙️ 加载 Lite 配置和自定义脚本
              env:
                  THEME_ARGON: ${{ inputs.theme_argon }}
                  THEME_AURORA: ${{ inputs.theme_aurora }}
                  THEME_ALPHA: ${{ inputs.theme_alpha }}
              run: |
                  [ -e "$FILES" ] && cp -a "$FILES" openwrt/files
                  find openwrt/files/etc/uci-defaults openwrt/files/etc/hotplug.d -type f -exec chmod 0755 {} \; 2>/dev/null || true
                  cp "$CONFIG_FILE" openwrt/.config
                  cd openwrt
                  "$GITHUB_WORKSPACE/$DIY_SH"
                  sed -i \
                    -e '/^CONFIG_PACKAGE_luci-theme-argon=/d' \
                    -e '/^CONFIG_PACKAGE_luci-app-argon-config=/d' \
                    -e '/^CONFIG_PACKAGE_luci-theme-aurora=/d' \
                    -e '/^CONFIG_PACKAGE_luci-app-aurora-config=/d' \
                    -e '/^CONFIG_PACKAGE_luci-theme-alpha=/d' \
                    -e '/^CONFIG_PACKAGE_luci-app-alpha-config=/d' \
                    -e '/^# CONFIG_PACKAGE_luci-theme-argon is not set/d' \
                    -e '/^# CONFIG_PACKAGE_luci-app-argon-config is not set/d' \
                    -e '/^# CONFIG_PACKAGE_luci-theme-aurora is not set/d' \
                    -e '/^# CONFIG_PACKAGE_luci-app-aurora-config is not set/d' \
                    -e '/^# CONFIG_PACKAGE_luci-theme-alpha is not set/d' \
                    -e '/^# CONFIG_PACKAGE_luci-app-alpha-config is not set/d' \
                    .config
                  {
                    echo ''
                    echo '### workflow 主题选择 ###'
                    if [ "$THEME_ARGON" = "true" ]; then
                      echo 'CONFIG_PACKAGE_luci-theme-argon=y'
                      echo 'CONFIG_PACKAGE_luci-app-argon-config=y'
                    fi
                    if [ "$THEME_AURORA" = "true" ]; then
                      echo 'CONFIG_PACKAGE_luci-theme-aurora=y'
                      echo 'CONFIG_PACKAGE_luci-app-aurora-config=y'
                    fi
                    if [ "$THEME_ALPHA" = "true" ]; then
                      echo 'CONFIG_PACKAGE_luci-theme-alpha=y'
                      echo 'CONFIG_PACKAGE_luci-app-alpha-config=y'
                    fi
                  } >> .config

            - name: 🧷 固定 AW1000 NSS 内核配置
              working-directory: ./openwrt
              run: |
                  grep -Eq '^(CONFIG_NF_CONNTRACK_DSCPREMARK_EXT=y|# CONFIG_NF_CONNTRACK_DSCPREMARK_EXT is not set)$' target/linux/qualcommax/ipq807x/config-default || \
                    echo '# CONFIG_NF_CONNTRACK_DSCPREMARK_EXT is not set' >> target/linux/qualcommax/ipq807x/config-default

            - name: 🧽 清理旧源码缓存
              working-directory: ./openwrt
              run: |
                  rm -rf dl/go-mod-cache
                  rm -rf ~/.npm ~/.cache/pip ~/.cache/node-gyp ~/.cargo/registry/cache 2>/dev/null || true
                  df -h

            - name: 📦 下载源码包
              working-directory: ./openwrt
              run: |
                  make defconfig
                  ./scripts/diffconfig.sh > "$GITHUB_WORKSPACE/aw1000-nss-lite-diffconfig.txt"
                  make download -j8
                  find dl -size -1024c -exec ls -l {} \;
                  find dl -size -1024c -exec rm -f {} \;
                  rm -rf dl/go-mod-cache
                  rm -rf ~/.npm ~/.cache/pip ~/.cache/node-gyp ~/.cargo/registry/cache 2>/dev/null || true
                  df -h
                  du -h -d1 /workdir/openwrt | sort -h

            - name: 🔨 编译固件
              id: compile
              run: |
                  chmod -R 755 openwrt
                  cd openwrt
                  echo -e "$(nproc) thread compile"
                  df -h
                  make -j$(nproc) || make -j1 V=s
                  echo "compile_status=success" >> $GITHUB_ENV
                  echo "status=success" >> $GITHUB_OUTPUT

            - name: 🗂️ 整理发布产物
              if: ${{ steps.compile.outputs.status == 'success' && !cancelled() }}
              run: |
                  test -d openwrt/bin/targets/qualcommax/ipq807x
                  mkdir -p release_artifacts
                  find openwrt/bin/targets/qualcommax/ipq807x -maxdepth 1 -type f -name '*arcadyan_aw1000*' -exec cp -a {} release_artifacts/ \;
                  cp -a openwrt/bin/targets/qualcommax/ipq807x/sha256sums release_artifacts/ 2>/dev/null || true
                  cp -a openwrt/.config release_artifacts/aw1000-nss-lite-full.config
                  cp -a "$GITHUB_WORKSPACE/aw1000-nss-lite-diffconfig.txt" release_artifacts/aw1000-nss-lite-diffconfig.txt

            - name: 📤 上传 AW1000 Lite 固件产物
              if: ${{ steps.compile.outputs.status == 'success' && !cancelled() }}
              uses: actions/upload-artifact@v4
              with:
                  name: aw1000-nss-lite
                  path: release_artifacts/*

    release:
        name: 🚀 发布 AW1000 NSS Lite 固件
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: 📥 下载 AW1000 Lite 固件产物
              uses: actions/download-artifact@v4
              with:
                  path: release_artifacts
                  merge-multiple: true

            - name: 🗓️ 生成发布版本号
              run: |
                  echo "release_date=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

            - name: 🚀 发布 AW1000 NSS Lite 固件
              uses: ncipollo/release-action@v1
              with:
                  tag: OpenWrt_AW1000_NSS_Lite_${{ env.release_date }}
                  artifacts: release_artifacts/*
                  allowUpdates: true
                  token: ${{ secrets.GITHUB_TOKEN }}
                  body: |
                      基于 qosmio/openwrt-ipq 的 24.10-nss 分支构建
                      NSS 包分支: NSS-12.5-K6.x-wwan
                      配置: AW1000-NSS/.config
                      设备: Arcadyan AW1000
                      默认管理地址: 192.168.123.1
                      默认账户: root
                      默认密码: password
                      说明: 基于 nss-setup/config-nss.seed 的 Lite 配置；保留 PassWall、diy.sh 自定义功能、QModem/WWAN、USB 共享网络和中文 LuCI，不内置 USB 存储/Samba 文件共享。

            - name: 🗑️ 清理旧版本发布
              uses: actions/github-script@v8
              env:
                  KEEP_LATEST: 10
                  DELETE_TAGS: true
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const keepLatest = Number(process.env.KEEP_LATEST || 10);
                      const deleteTags = String(process.env.DELETE_TAGS || "true").toLowerCase() === "true";
                      const { owner, repo } = context.repo;
                      const prefix = "OpenWrt_AW1000_NSS_Lite_";
                      const releases = await github.paginate(
                        github.rest.repos.listReleases,
                        { owner, repo, per_page: 100 }
                      );
                      const filtered = releases
                        .filter((release) => release.tag_name && release.tag_name.startsWith(prefix))
                        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                      const toDelete = filtered.slice(keepLatest);
                      for (const release of toDelete) {
                        await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
                        if (deleteTags && release.tag_name) {
                          try {
                            await github.rest.git.deleteRef({ owner, repo, ref: `tags/${release.tag_name}` });
                          } catch (err) {
                            core.warning(`Failed to delete tag ${release.tag_name}: ${err.message}`);
                          }
                        }
                      }

name: 📦 SDK 编译 AW1000 自定义软件包

on:
    workflow_dispatch:

permissions:
    contents: write
    actions: write

env:
    SDK_RELEASE: 24.10.6
    SDK_TARGET: qualcommax
    SDK_SUBTARGET: ipq807x
    TZ: Asia/Shanghai

jobs:
    build-packages:
        name: 🧩 SDK 快速编译自定义包
        runs-on: ubuntu-latest

        steps:
            - name: 📥 检出当前仓库
              uses: actions/checkout@v6

            - name: 🧰 安装编译依赖
              env:
                  DEBIAN_FRONTEND: noninteractive
              run: |
                  sudo -E apt-get -qq update --fix-missing
                  sudo -E apt-get -qq install -y --no-install-recommends \
                    build-essential clang flex bison g++ gawk gcc-multilib gettext git \
                    libncurses-dev libssl-dev python3 python3-distutils python3-setuptools \
                    rsync swig unzip wget zlib1g-dev file libelf-dev ccache ecj fastjar \
                    java-propose-classpath libzstd-dev zstd dos2unix
                  sudo -E apt-get -qq autoremove --purge -y
                  sudo -E apt-get -qq clean
                  sudo timedatectl set-timezone "$TZ"

            - name: 🦀 准备 Rust AW1000 目标
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-unknown-linux-musl

            - name: 🦀 检查 Rust 工具链
              run: |
                  rustc --version
                  cargo --version

            - name: 📦 下载 OpenWrt AW1000 目标 SDK
              run: |
                  SDK_BASE_URL="https://downloads.openwrt.org/releases/${SDK_RELEASE}/targets/${SDK_TARGET}/${SDK_SUBTARGET}"
                  SDK_TARBALL="$(wget -qO- "${SDK_BASE_URL}/" | sed -n 's/.*href="\([^"]*openwrt-sdk-[^"]*Linux-x86_64\.tar\.zst\)".*/\1/p' | head -n1)"
                  test -n "$SDK_TARBALL" || {
                    echo "::error::没有在 ${SDK_BASE_URL}/ 找到 OpenWrt SDK"
                    exit 1
                  }
                  wget -nv "${SDK_BASE_URL}/${SDK_TARBALL}"
                  tar --zstd -xf "$SDK_TARBALL"
                  SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
                  test -n "$SDK_DIR" || {
                    echo "::error::SDK 解压后未找到 openwrt-sdk-* 目录"
                    exit 1
                  }
                  mv "$SDK_DIR" openwrt-sdk
                  echo "SDK_TARBALL=$SDK_TARBALL" >> "$GITHUB_ENV"

            - name: 💾 缓存 SDK 编译目录
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo
                      ~/.rustup
                      ~/.ccache
                      openwrt-sdk/dl
                      openwrt-sdk/build_dir
                      openwrt-sdk/staging_dir/host
                      openwrt-sdk/staging_dir/hostpkg
                  key: ${{ runner.os }}-aw1000-sdk-packages-${{ env.SDK_RELEASE }}-${{ hashFiles('packages/**') }}
                  restore-keys: |
                      ${{ runner.os }}-aw1000-sdk-packages-${{ env.SDK_RELEASE }}-

            - name: 🛠️ 准备脚本和本地包
              run: |
                  find packages -type f \( -name "*.sh" -o -name "Makefile" -o -name "*.js" -o -name "*.json" -o -name "*.rs" -o -name "*.toml" -o -name "*.md" -o -path "*/etc/config/*" -o -path "*/etc/init.d/*" -o -path "*/etc/uci-defaults/*" \) -exec dos2unix {} \; || true

            - name: 🔄 更新并安装 SDK feeds
              working-directory: ./openwrt-sdk
              run: |
                  ./scripts/feeds update -a
                  ./scripts/feeds install -a

            - name: 📦 导入本地自定义包
              run: |
                  mkdir -p openwrt-sdk/package/custom-feeds
                  test -d packages
                  for pkg in packages/*; do
                    [ -d "$pkg" ] || continue
                    name="$(basename "$pkg")"
                    rm -rf "openwrt-sdk/package/custom-feeds/$name"
                    cp -a "$pkg" "openwrt-sdk/package/custom-feeds/$name"
                  done
                  find openwrt-sdk/package/custom-feeds -maxdepth 2 -name Makefile -print

            - name: ⚙️ 生成 SDK 包配置
              run: |
                  {
                    echo 'CONFIG_TARGET_qualcommax=y'
                    echo 'CONFIG_TARGET_qualcommax_ipq807x=y'
                    echo ''
                    echo '### SDK 自定义包编译 ###'
                    for pkg in packages/*; do
                      [ -d "$pkg" ] || continue
                      name="$(sed -n 's/^PKG_NAME:=//p' "$pkg/Makefile" 2>/dev/null | head -n1)"
                      [ -n "$name" ] || name="$(basename "$pkg")"
                      echo "CONFIG_PACKAGE_${name}=y"
                    done
                  } > openwrt-sdk/.config
                  cd openwrt-sdk
                  make defconfig
                  ./scripts/diffconfig.sh > "$GITHUB_WORKSPACE/aw1000-sdk-custom-packages-diffconfig.txt"
                  echo "==> 本次启用的本地包"
                  for pkg in "$GITHUB_WORKSPACE"/packages/*; do
                    [ -d "$pkg" ] || continue
                    name="$(sed -n 's/^PKG_NAME:=//p' "$pkg/Makefile" 2>/dev/null | head -n1)"
                    [ -n "$name" ] || name="$(basename "$pkg")"
                    grep -E "^(CONFIG_PACKAGE_${name}=|# CONFIG_PACKAGE_${name} is not set)" .config || true
                  done

            - name: 📥 下载本地包源码
              working-directory: ./openwrt-sdk
              run: |
                  for pkg in "$GITHUB_WORKSPACE"/packages/*; do
                    [ -d "$pkg" ] || continue
                    name="$(basename "$pkg")"
                    make "package/custom-feeds/${name}/download" V=s || true
                  done

            - name: 🔨 编译本地自定义包
              working-directory: ./openwrt-sdk
              run: |
                  failed=0
                  for pkg in "$GITHUB_WORKSPACE"/packages/*; do
                    [ -d "$pkg" ] || continue
                    name="$(basename "$pkg")"
                    echo "==> 编译 ${name}"
                    if ! make -j"$(nproc)" "package/custom-feeds/${name}/compile" V=s; then
                      echo "::error::${name} 编译失败"
                      failed=1
                    fi
                  done
                  exit "$failed"

            - name: 🗂️ 整理软件包产物
              run: |
                  mkdir -p package_artifacts
                  cp -a aw1000-sdk-custom-packages-diffconfig.txt package_artifacts/
                  echo "$SDK_TARBALL" > package_artifacts/sdk-source.txt
                  if [ -d openwrt-sdk/bin/packages ]; then
                    cp -a openwrt-sdk/bin/packages package_artifacts/
                  fi
                  find package_artifacts -type f | sort

            - name: 📤 上传软件包产物
              uses: actions/upload-artifact@v4
              with:
                  name: aw1000-sdk-custom-packages
                  path: package_artifacts/**
                  if-no-files-found: error

    release:
        name: 🚀 发布 AW1000 SDK 自定义软件包
        runs-on: ubuntu-latest
        needs: build-packages

        steps:
            - name: 📥 下载软件包产物
              uses: actions/download-artifact@v4
              with:
                  path: release_artifacts
                  merge-multiple: true

            - name: 🗓️ 生成发布版本号
              run: |
                  echo "release_date=$(date +'%Y%m%d%H%M')" >> "$GITHUB_ENV"
                  find release_artifacts -type f | sort

            - name: 🚀 发布 AW1000 SDK 自定义软件包
              uses: ncipollo/release-action@v1
              with:
                  tag: AW1000_SDK_Custom_Packages_${{ env.release_date }}
                  artifacts: release_artifacts/**
                  allowUpdates: true
                  token: ${{ secrets.GITHUB_TOKEN }}
                  body: |
                      AW1000 自定义软件包 SDK 快速编译产物。

                      SDK: OpenWrt 24.10.6 qualcommax/ipq807x
                      包来源: LEDE/packages

                      适用范围:
                      - 纯 LuCI / shell 包
                      - 普通用户态二进制服务，例如 rg500q-at-webserver

                      不适合:
                      - kmod-* 内核模块
                      - 强依赖 NSS 内核符号或私有内核 ABI 的包

            - name: 🗑️ 清理旧版本发布
              uses: actions/github-script@v8
              env:
                  KEEP_LATEST: 10
                  DELETE_TAGS: true
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const keepLatest = Number(process.env.KEEP_LATEST || 10);
                      const deleteTags = String(process.env.DELETE_TAGS || "true").toLowerCase() === "true";
                      const { owner, repo } = context.repo;
                      const prefix = "AW1000_SDK_Custom_Packages_";
                      const releases = await github.paginate(
                        github.rest.repos.listReleases,
                        { owner, repo, per_page: 100 }
                      );
                      const filtered = releases
                        .filter((release) => release.tag_name && release.tag_name.startsWith(prefix))
                        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                      const toDelete = filtered.slice(keepLatest);
                      for (const release of toDelete) {
                        await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
                        if (deleteTags && release.tag_name) {
                          try {
                            await github.rest.git.deleteRef({ owner, repo, ref: `tags/${release.tag_name}` });
                          } catch (err) {
                            core.warning(`Failed to delete tag ${release.tag_name}: ${err.message}`);
                          }
                        }
                      }

<%+header%>

<div class="modemwebui-frame-wrap">
	<iframe id="modemwebui-frame" title="RG500QEA_WebUI"></iframe>
</div>

<style>
	html,
	body,
	#maincontent,
	#maincontainer,
	#content,
	.main,
	.main-content {
		overflow: hidden !important;
		height: 100%;
	}

	.modemwebui-frame-wrap {
		min-height: 100vh;
		margin: 0;
		padding: 0;
	}

	#modemwebui-frame {
		position: fixed;
		top: 0;
		left: 240px;
		width: calc(100% - 240px);
		height: 100vh;
		border: 0;
		z-index: 9999;
		background: #fff;
	}

	@media (max-width: 768px) {
		#modemwebui-frame {
			top: 58px;
			left: 0;
			width: 100%;
			height: calc(100vh - 58px);
		}
	}
</style>

<script>
	(function() {
		function setFrameSrc() {
			var frame = document.getElementById('modemwebui-frame');
			if (!frame)
				return;

			frame.src = window.location.protocol + '//' + window.location.hostname + ':8001/#/dashboard';
		}

		function resizeFrame() {
			var frame = document.getElementById('modemwebui-frame');
			var menu = document.getElementById('mainmenu');
			var mobile = window.innerWidth <= 768;
			var left = 0;

			if (!frame)
				return;

			if (mobile || !menu) {
				frame.style.left = '0';
				frame.style.width = '100%';
				return;
			}

			left = Math.max(0, Math.round(menu.getBoundingClientRect().right));
			frame.style.left = left + 'px';
			frame.style.width = 'calc(100% - ' + left + 'px)';
		}

		function scheduleResize() {
			resizeFrame();
			window.requestAnimationFrame(resizeFrame);
			window.setTimeout(resizeFrame, 80);
			window.setTimeout(resizeFrame, 250);
			window.setTimeout(resizeFrame, 800);
		}

		document.addEventListener('DOMContentLoaded', function() {
			setFrameSrc();
			scheduleResize();
		});
		window.addEventListener('load', scheduleResize);
		window.addEventListener('resize', resizeFrame);
		window.addEventListener('orientationchange', scheduleResize);

		if (window.ResizeObserver) {
			window.setTimeout(function() {
				var menu = document.getElementById('mainmenu');
				if (menu)
					new ResizeObserver(resizeFrame).observe(menu);
			}, 0);
		}
	})();
</script>

<%+footer%>
